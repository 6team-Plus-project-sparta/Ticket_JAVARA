server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/ticketjavara?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

  jackson:
    time-zone: Asia/Seoul

  cache:
    # caffeine | redis  (ADR-006: @ConditionalOnProperty로 캐시 구현체 전환)
    provider: caffeine

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-minimum-256-bits-long-placeholder}
  expiration: 3600000

lock:
  # lettuce | redisson  (ADR-002: @ConditionalOnProperty로 락 구현체 전환)
  provider: lettuce
