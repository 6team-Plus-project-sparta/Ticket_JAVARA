server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/ticketjavara?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}
  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 500 #벌크데이터 추가를위한 세팅
          order_inserts: true #벌크데이터 추가를위한 세팅
          time_zone: Asia/Seoul
    open-in-view: false

  jackson:
    time-zone: Asia/Seoul

cache:
  # caffeine | redis  (ADR-006: @ConditionalOnProperty로 캐시 구현체 전환)
  provider: redis

logging:
  level:
#    org.hibernate.SQL: debug
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

lock:
  # lettuce | redisson  (ADR-002: @ConditionalOnProperty로 락 구현체 전환)
  provider: lettuce

cors:
  allowed-origins: "http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000"
