server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 500
          order_inserts: true
          time_zone: Asia/Seoul
    open-in-view: false

  jackson:
    time-zone: Asia/Seoul

  cache:
    provider: redis

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

lock:
  provider: lettuce

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
cors:
  allowed-origins:
    - "https://www.ticketflow.io"
    - "https://d3c4hewjvq93kw.cloudfront.net"
    - "https://ticket-javara.site"
