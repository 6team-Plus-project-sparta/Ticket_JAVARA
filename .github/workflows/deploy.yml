name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU 설정 (ARM64 빌드 지원)
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 이미지 빌드 & 푸시 (ARM64 대응)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-javara:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ticket-javara:latest
          cache-to: type=inline

      - name: docker-compose.yml EC2에 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}"

      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}

            # 현재 배포 중인 버전을 이전 버전으로 저장 (롤백용)
            PREVIOUS_TAG=$(cat .previous_tag 2>/dev/null || echo "")

            # 환경변수 파일 생성 (IMAGE_TAG = 새 커밋 해시)
            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=${{ github.sha }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }}
            EOF

            # 새 앱 이미지 Pull
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ticket-javara:${{ github.sha }}

            # MySQL, Redis는 유지하고 앱만 재시작
            docker compose --env-file .env up -d --no-deps app

            # 컨테이너가 starting 상태로 전환될 때까지 대기
            echo "컨테이너 재시작 대기 중... (50초)"
            sleep 50

            # Docker 헬스체크 상태로 대기 (docker-compose.yml의 healthcheck 활용)
            echo "헬스체크 대기 중..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' ticketjavara-app)
              echo "⏳ 상태 확인 중... (${i}/30) → 현재: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ 배포 성공!"
                echo "${{ github.sha }}" > .previous_tag
                exit 0
              fi
              sleep 5
            done

            # 헬스체크 실패 시 이전 버전으로 롤백
            echo "❌ 헬스체크 실패 - 이전 버전으로 롤백"
            if [ -n "$PREVIOUS_TAG" ]; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${PREVIOUS_TAG}/" .env
              docker compose --env-file .env up -d --no-deps app
              echo "↩️ ${PREVIOUS_TAG} 버전으로 롤백 완료"
            else
              echo "⚠️ 이전 버전 정보 없음 - 롤백 불가"
            fi
            exit 1
