name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-javara:latest

      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ticket-javara:latest

            # 기존 컨테이너를 old로 이름 변경 후 중지 (새 컨테이너 뜨는 동안 유지)
            docker rename ticket-javara ticket-javara-old || true
            docker stop ticket-javara-old || true

            # 새 컨테이너 실행 (볼륨 마운트로 데이터 영속성 보장)
            docker run -d \
              --name ticket-javara \
              --restart always \
              -p 8080:8080 \
              -v /home/${{ secrets.EC2_USER }}/app-data:/app/data \
              ${{ secrets.DOCKERHUB_USERNAME }}/ticket-javara:latest

            # 10초 후 새 컨테이너 정상 확인 후 구 컨테이너 삭제
            sleep 10
            docker rm -f ticket-javara-old || true